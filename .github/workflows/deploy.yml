name: Deploy to Bitnami via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/bitnami/apache/htdocs/OPilot"
            REPO_URL="https://github.com/BKaud/OPilot.git"

            # Clone or update
            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "Repository found. Pulling latest changes..."
              cd "$DEPLOY_DIR"
              git fetch --all
              git reset --hard origin/main
            else
              echo "Repository not found. Cloning..."
              mkdir -p "$DEPLOY_DIR"
              git clone --branch main "$REPO_URL" "$DEPLOY_DIR"
            fi

            # Ensure DBfiles dir exists
            mkdir -p "$DEPLOY_DIR/DBfiles"

            # Write app_config.php from secrets
            cat > "$DEPLOY_DIR/DBfiles/app_config.php" <<PHP
<?php
// auto-generated by deploy pipeline
define('BASE_PATH', '${{ secrets.BASE_PATH }}');
define('DB_HOST', '${{ secrets.SERVER_HOST }}');
define('DB_PORT', 3306);
define('DB_USER', '${{ secrets.SERVER_USER }}');
define('DB_PASS', '${{ secrets.SERVER_PASS }}');
define('DB_NAME', '${{ secrets.SERVER_DB_NAME }}');
PHP

            echo "Wrote DBfiles/app_config.php"

            echo "Deployment complete."
