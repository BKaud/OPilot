<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operator Rotation Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
</head>

<body>
  <!-- NAVBAR (unchanged) -->
  <nav class="navbar">
    <div class="navbar-logo">
      <img id="logoanim" src="../../assets/images/compassanim.gif" alt="OPilot Logo" />
      <img id="logotext" class="logoText" src="../../assets/images/oppilottext.png" />
    </div>
      <div class="navbar-login">
        <div class="login-fields">
          <input type="text" placeholder="Username" />
          <input type="password" placeholder="Password" />
        </div>
        <button class="login-btn">Login</button>
    </div>
  </nav>


  <div class="main">
    <!-- LEFT Static Sidebar (just buttons now) -->
    <aside id="sidebar" class="sidebar closed">
      <button id="add-event-btn" class="btn-special">Add Event</button>
      <button id="push-rotation-btn" class="btn-special">Push Rotation</button>
      <div class="button-row">
        <button id="addRideBtn">Add Ride</button>
        <button id="removeRideBtn">Remove Ride</button>
        <button id="addOperatorBtn">Add Operator</button>
        <button id="removeOperatorBtn">Remove Operator</button>
      </div>
    </aside>

    <!-- RIGHT operations area now split into two columns -->
    <section class="operations-container">
      <!-- 1) Schedule column (unchanged) -->
      <div class="ops-col ops-schedule">
        <h3>Rotation Schedule</h3>
        <!-- … your rotation‐time‐block items … -->
      </div>

      <!-- 2) Main ops column -->
      <div class="ops-col ops-main">
        <!-- (optional) slider preview -->
        <div class="rotation-preview">
          <input type="range" id="rotationSlider" min="0" max="100" value="0" />
        </div>

        <!-- Current Ride Positions header -->
        <h2 id="crp">Current Ride Positions</h2>

        <!-- Ride panels -->
        <div class="ride-container">
          <div class="ride-group">
            <!-- rides rendered here -->
          </div>
        </div>

        <!-- Bottom: Shift & Break side by side -->
        <div class="bottom-panels">
          <div class="panel-box shift-panel">
            <h3>Operators On Shift</h3>
            <div id="operatorsOnShift" class="operators-on-shift"></div>
          </div>
          <div class="panel-box break-panel">
            <h3>On Break</h3>
            <div id="operatorsOnBreak" class="operators-on-break"></div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <!-- MODAL OVERLAY (unchanged) -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box">
      <p id="modalMessage">Are you sure?</p>
      <div class="modal-buttons">
        <button id="modalConfirm">Yes</button>
        <button id="modalCancel">No</button>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script type="module" src="js/state.js"></script>
  <script type="module" src="js/render.js"></script>
  <script type="module" src="js/modal.js"></script>
  <script type="module" src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      const sidebar = document.getElementById('sidebar');
      const logoAnim = document.getElementById('logoanim');
      const logoText = document.getElementById('logotext')
      const forwardGif = '../../assets/images/compassanim.gif';
      const reverseGif = '../../assets/images/compassanim-reverse.gif';


      sidebar.addEventListener('mouseover', () => {
        const isOpen = sidebar.classList.toggle('open');
        sidebar.classList.toggle('closed', !isOpen);
        logoText.classList.add('act')
        logoText.classList.remove('logoText')
        // swap the GIF src to replay forward or backward
        logoAnim.src = isOpen ? forwardGif : reverseGif;
        // force‐reload so it starts from the beginning
        logoAnim.src = logoAnim.src + '?t=' + Date.now();
      });

      sidebar.addEventListener('mouseout', () => {
        logoText.classList.remove('act')
        logoText.classList.add('logoText')
      });
    });
  </script>
</body>

</html>
