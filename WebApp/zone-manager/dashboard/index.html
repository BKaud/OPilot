<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operator Rotation Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
</head>
<body>
  <!-- NAVBAR (unchanged) -->
  <nav class="navbar">
    <div class="navbar-logo">
      <img src="../../assets/images/Opilotlogonavy.png" alt="OPilot Logo" />
    </div>
    <button id="toggleEditModeBtn">Edit Mode: OFF</button>
    <div class="navbar-login">
      <div class="login-fields">
        <input type="text" placeholder="Username" />
        <input type="password" placeholder="Password" />
      </div>
      <button class="login-btn">Login</button>
    </div>
  </nav>

  <div class="main">
    <!-- LEFT Static Sidebar (just buttons now) -->
    <aside class="sidebar">
      <button id="add-event-btn" class="btn-special">Add Event</button>
      <button id="push-rotation-btn" class="btn-special">Push Rotation</button>
      <div class="button-row">
        <button id="addRideBtn">Add Ride</button>
        <button id="removeRideBtn">Remove Ride</button>
        <button id="addOperatorBtn">Add Operator</button>
        <button id="removeOperatorBtn">Remove Operator</button>
      </div>
    </aside>

    <!-- RIGHT operations area now split into two columns -->
    <section class="operations-container">
      <!-- 1) Schedule column -->
      <div class="ops-col ops-schedule">
        <h3>Rotation Schedule</h3>
        <!-- reuse your schedule markup in here -->
        <div class="rotation-time-block">
          <h4>2:00 PM Rotation</h4>
          <!-- ... -->
        </div>
        <div class="rotation-time-block">
          <h4>2:15 PM Rotation</h4>
          <!-- ... -->
        </div>
      </div>

      <!-- 2) Main ops column (shifts + rides) -->
      

        <h2 id="crp">Current Ride Positions</h2>
        <div class="ride-container">
          <div class="ride-group">
            <!-- rides rendered here -->
          </div>
        </div>
        <div class="ops-col ops-main">
        <div class="operator-shift-container">
          <h3>Operators On Shift</h3>
          <div id="operatorsOnShift" class="operators-on-shift"></div>
          <h3>On Break</h3>
          <div id="operatorsOnBreak" class="operators-on-break"></div>
        </div>
      </div>
    </section>
  </div>

  <!-- MODAL OVERLAY (unchanged) -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box">
      <p id="modalMessage">Are you sure?</p>
      <div class="modal-buttons">
        <button id="modalConfirm">Yes</button>
        <button id="modalCancel">No</button>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script type="module" src="js/state.js"></script>
  <script type="module" src="js/render.js"></script>
  <script type="module" src="js/modal.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
